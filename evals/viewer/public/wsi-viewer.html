<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORIGAMI WSI Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #111;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        .topbar {
            background: #1a1a2e;
            padding: 0 16px;
            display: flex;
            align-items: center;
            height: 42px;
            gap: 10px;
            flex-shrink: 0;
            border-bottom: 1px solid #333;
        }
        .topbar .brand { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 2px; }
        .topbar .sep { color: #333; }
        .topbar .zoom-display {
            background: rgba(0,0,0,0.5); color: #8ecae6; padding: 4px 8px;
            border-radius: 4px; font-size: 12px; font-family: ui-monospace, monospace; border: 1px solid #333;
        }
        .topbar button, .topbar .tb-link {
            background: rgba(0,0,0,0.5); color: #8ecae6; border: 1px solid #555;
            padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
            cursor: pointer; text-decoration: none; font-family: inherit;
        }
        .topbar button:hover, .topbar .tb-link:hover { border-color: #8ecae6; }
        .topbar button.active { background: #0f3460; border-color: #8ecae6; }
        .topbar select {
            background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #555;
            padding: 4px 8px; border-radius: 4px; font-size: 12px; cursor: pointer; max-width: 200px;
        }

        /* ── Viewer Grid ── */
        .viewer-grid {
            flex: 1;
            display: grid;
            gap: 2px;
            min-height: 0;
        }
        .viewer-pane {
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }
        .viewer-pane .osd { width: 100%; height: 100%; }
        .pane-header {
            position: absolute;
            top: 6px; left: 6px; right: 6px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .pane-header select {
            background: rgba(0,0,0,0.85); color: #fff; border: 1px solid #555;
            padding: 3px 6px; border-radius: 4px; font-size: 11px; cursor: pointer;
            flex: 1; min-width: 0;
        }
        .pane-header .size-tag {
            color: #8ecae6; font-size: 10px; font-family: ui-monospace, monospace;
            background: rgba(0,0,0,0.7); padding: 3px 6px; border-radius: 4px;
            white-space: nowrap;
        }
        .pane-close {
            background: rgba(0,0,0,0.7); color: #888; border: 1px solid #555;
            width: 20px; height: 20px; border-radius: 3px; font-size: 12px; line-height: 18px;
            text-align: center; cursor: pointer; flex-shrink: 0;
        }
        .pane-close:hover { color: #ff6b6b; border-color: #ff6b6b; }

        /* ── Adjustments Panel ── */
        .adjust-panel {
            background: #1a1a2e; border-top: 1px solid #333;
            padding: 10px 16px; flex-shrink: 0; display: none;
        }
        .adjust-panel.open { display: block; }
        .adjust-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .adjust-header .title { color: #fff; font-size: 13px; font-weight: 600; }
        .adjust-scope button {
            background: none; border: 1px solid #555; color: #aaa;
            padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        .adjust-scope button.active { color: #8ecae6; border-color: #8ecae6; }
        .adjust-reset {
            background: none; border: 1px solid #555; color: #aaa;
            padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: auto;
        }
        .adjust-reset:hover { color: #fff; border-color: #888; }
        .adjust-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px 20px;
        }
        .adjust-item { display: flex; align-items: center; gap: 6px; }
        .adjust-item label { color: #8ecae6; font-size: 11px; font-weight: 600; min-width: 65px; text-align: right; }
        .adjust-item input[type="range"] { flex: 1; accent-color: #8ecae6; height: 3px; }
        .adjust-item .val { color: #aaa; font-size: 10px; font-family: ui-monospace, monospace; min-width: 32px; text-align: right; }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
    <div class="brand">ORIGAMI</div>
    <span class="sep">|</span>
    <select id="add-split" title="Add a viewer panel">
        <option value="">+ Split</option>
    </select>
    <span style="flex:1"></span>
    <a href="/tissue-summary.html" target="_blank" class="tb-link">Tissue Map</a>
    <span id="zoom-level" class="zoom-display"></span>
    <button id="zoom-1to1">1:1</button>
    <button id="btn-adjust">Adjust</button>
</div>

<!-- Dynamic Viewer Grid -->
<div id="viewer-grid" class="viewer-grid"></div>

<!-- Adjustment Panel -->
<div id="adjust-panel" class="adjust-panel">
    <div class="adjust-header">
        <span class="title">Image Adjustments</span>
        <div class="adjust-scope" id="scope-buttons"></div>
        <button class="adjust-reset" id="btn-reset">Reset</button>
    </div>
    <div class="adjust-grid">
        <div class="adjust-item"><label>Brightness</label><input type="range" id="adj-brightness" min="50" max="200" value="100"><span class="val" id="val-brightness">100%</span></div>
        <div class="adjust-item"><label>Contrast</label><input type="range" id="adj-contrast" min="50" max="200" value="100"><span class="val" id="val-contrast">100%</span></div>
        <div class="adjust-item"><label>Saturation</label><input type="range" id="adj-saturate" min="0" max="300" value="100"><span class="val" id="val-saturate">100%</span></div>
        <div class="adjust-item"><label>Hue</label><input type="range" id="adj-hue" min="-180" max="180" value="0"><span class="val" id="val-hue">0&deg;</span></div>
        <div class="adjust-item"><label>Gamma</label><input type="range" id="adj-gamma" min="20" max="300" value="100"><span class="val" id="val-gamma">1.00</span></div>
        <div class="adjust-item"><label>Invert</label><input type="range" id="adj-invert" min="0" max="100" value="0"><span class="val" id="val-invert">0%</span></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
(function() {
    var slides = [];
    var panels = [];  // { id, slideId, viewer, el }
    var nextId = 0;
    var syncing = false;
    var adjustScope = 'all';

    var DEFAULTS = ['3DHISTECH-1_original', '3DHISTECH-1_jxl40'];

    var osdOpts = {
        prefixUrl: 'https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/',
        showNavigator: false, animationTime: 0.6, springStiffness: 12,
        visibilityRatio: 1.0, constrainDuringPan: false, immediateRender: false,
        blendTime: 0.15, maxZoomPixelRatio: 8, pixelsPerWheelLine: 60,
        zoomPerScroll: 1.2, zoomPerClick: 2.0, minZoomImageRatio: 0.5, maxZoomLevel: 800,
        gestureSettingsMouse: { flickEnabled: true, flickMinSpeed: 180, flickMomentum: 0.15,
            dragToPan: true, scrollToZoom: true, clickToZoom: true, dblClickToZoom: true, pinchToZoom: true },
        gestureSettingsTouch: { flickEnabled: true, flickMinSpeed: 120, flickMomentum: 0.15,
            dragToPan: true, scrollToZoom: false, clickToZoom: false, dblClickToZoom: true, pinchToZoom: true },
    };

    // ── Grid layout ──
    function getGridCols(n) {
        if (n <= 1) return 1;
        if (n <= 2) return 2;
        if (n <= 3) return 3;
        if (n <= 4) return 2;
        if (n <= 6) return 3;
        if (n <= 8) return 4;
        return Math.ceil(Math.sqrt(n));
    }

    function updateGrid() {
        var grid = document.getElementById('viewer-grid');
        var cols = getGridCols(panels.length);
        grid.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
        // Hide close button if only 2 panels
        panels.forEach(function(p) {
            var btn = p.el.querySelector('.pane-close');
            if (btn) btn.style.display = panels.length <= 2 ? 'none' : '';
        });
    }

    // ── Sync all viewers ──
    function syncAllTo(src) {
        if (syncing) return;
        syncing = true;
        var center = src.viewport.getCenter(false);
        var zoom = src.viewport.getZoom(false);
        panels.forEach(function(p) {
            if (p.viewer && p.viewer !== src) {
                p.viewer.viewport.panTo(center, false);
                p.viewer.viewport.zoomTo(zoom, null, false);
            }
        });
        syncing = false;
        updateZoomDisplay();
    }

    function updateZoomDisplay() {
        var v = panels.length ? panels[0].viewer : null;
        if (!v) return;
        var tiledImage = v.world.getItemAt(0);
        if (tiledImage) {
            var imgWidth = tiledImage.getContentSize().x;
            var viewportWidth = v.viewport.getContainerSize().x;
            var ratio = v.viewport.getZoom(false) * viewportWidth / imgWidth;
            document.getElementById('zoom-level').textContent =
                ratio >= 1 ? ratio.toFixed(1) + 'x' : '1:' + (1/ratio).toFixed(1);
        }
    }

    // ── Create/remove panels ──
    function addPanel(slideId) {
        var id = nextId++;
        var grid = document.getElementById('viewer-grid');

        // Create pane DOM
        var pane = document.createElement('div');
        pane.className = 'viewer-pane';
        pane.id = 'pane-' + id;

        var header = document.createElement('div');
        header.className = 'pane-header';

        var sel = document.createElement('select');
        slides.forEach(function(s) {
            var opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.label || s.id;
            sel.appendChild(opt);
        });
        sel.value = slideId;

        var sizeTag = document.createElement('span');
        sizeTag.className = 'size-tag';
        sizeTag.id = 'size-' + id;

        var closeBtn = document.createElement('div');
        closeBtn.className = 'pane-close';
        closeBtn.textContent = '\u00D7';
        closeBtn.title = 'Remove this panel';

        header.appendChild(sel);
        header.appendChild(sizeTag);
        header.appendChild(closeBtn);

        var osdDiv = document.createElement('div');
        osdDiv.className = 'osd';
        osdDiv.id = 'osd-' + id;

        pane.appendChild(header);
        pane.appendChild(osdDiv);
        grid.appendChild(pane);

        // Create OSD viewer
        var savedCenter = null, savedZoom = null;
        if (panels.length > 0 && panels[0].viewer) {
            savedCenter = panels[0].viewer.viewport.getCenter(false);
            savedZoom = panels[0].viewer.viewport.getZoom(false);
        }

        var viewer = OpenSeadragon(Object.assign({
            id: 'osd-' + id,
            showNavigator: panels.length === 0,
            tileSources: '/dzi/' + slideId + '.dzi'
        }, osdOpts));

        viewer.addHandler('zoom', function() { syncAllTo(viewer); });
        viewer.addHandler('pan', function() { syncAllTo(viewer); });

        if (savedCenter && savedZoom) {
            viewer.addOnceHandler('open', function() {
                viewer.viewport.panTo(savedCenter, true);
                viewer.viewport.zoomTo(savedZoom, null, true);
            });
        }

        var panel = { id: id, slideId: slideId, viewer: viewer, el: pane };
        panels.push(panel);

        // Update size label
        var slide = slides.find(function(s) { return s.id === slideId; });
        sizeTag.textContent = slide ? slide.disk_size_mb.toFixed(0) + ' MB' : '';

        // Wire select change
        sel.addEventListener('change', function() {
            var newId = sel.value;
            panel.slideId = newId;
            viewer.open('/dzi/' + newId + '.dzi');
            var s = slides.find(function(s) { return s.id === newId; });
            sizeTag.textContent = s ? s.disk_size_mb.toFixed(0) + ' MB' : '';
        });

        // Wire close button
        closeBtn.addEventListener('click', function() {
            removePanel(id);
        });

        updateGrid();
        updateScopeButtons();
    }

    function removePanel(id) {
        if (panels.length <= 2) return;
        var idx = panels.findIndex(function(p) { return p.id === id; });
        if (idx < 0) return;
        var panel = panels[idx];
        if (panel.viewer) panel.viewer.destroy();
        panel.el.remove();
        panels.splice(idx, 1);
        updateGrid();
        updateScopeButtons();
    }

    // ── Add-split dropdown ──
    function populateAddSplit() {
        var sel = document.getElementById('add-split');
        sel.innerHTML = '<option value="">+ Split</option>';
        slides.forEach(function(s) {
            var opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.label || s.id;
            sel.appendChild(opt);
        });
        sel.addEventListener('change', function() {
            if (this.value) {
                addPanel(this.value);
                this.value = '';
            }
        });
    }

    // ── Adjustments ──
    var defaults = { brightness: 100, contrast: 100, saturate: 100, hue: 0, gamma: 100, invert: 0 };
    var adjustments = Object.assign({}, defaults);

    function applyFilters() {
        var parts = [];
        parts.push('brightness(' + (adjustments.brightness / 100) + ')');
        parts.push('contrast(' + (adjustments.contrast / 100) + ')');
        parts.push('saturate(' + (adjustments.saturate / 100) + ')');
        if (adjustments.hue !== 0) parts.push('hue-rotate(' + adjustments.hue + 'deg)');
        if (adjustments.invert > 0) parts.push('invert(' + (adjustments.invert / 100) + ')');
        if (adjustments.gamma !== 100) {
            var g = adjustments.gamma / 100;
            parts.push('brightness(' + (Math.pow(0.5, 1/g) / 0.5).toFixed(3) + ')');
        }
        var filterStr = parts.join(' ');

        panels.forEach(function(p, i) {
            var apply = adjustScope === 'all' || adjustScope === String(i);
            var el = document.getElementById('osd-' + p.id);
            if (el) {
                el.style.filter = apply ? filterStr : '';
                el.querySelectorAll('canvas').forEach(function(c) { c.style.filter = apply ? filterStr : ''; });
            }
        });
    }

    function updateScopeButtons() {
        var container = document.getElementById('scope-buttons');
        container.innerHTML = '';
        var allBtn = document.createElement('button');
        allBtn.textContent = 'All';
        allBtn.className = adjustScope === 'all' ? 'active' : '';
        allBtn.addEventListener('click', function() { adjustScope = 'all'; updateScopeButtons(); applyFilters(); });
        container.appendChild(allBtn);

        panels.forEach(function(p, i) {
            var btn = document.createElement('button');
            btn.textContent = (i + 1);
            btn.className = adjustScope === String(i) ? 'active' : '';
            btn.addEventListener('click', function() { adjustScope = String(i); updateScopeButtons(); applyFilters(); });
            container.appendChild(btn);
        });
    }

    ['brightness', 'contrast', 'saturate', 'hue', 'gamma', 'invert'].forEach(function(name) {
        var slider = document.getElementById('adj-' + name);
        var valEl = document.getElementById('val-' + name);
        if (!slider) return;
        slider.addEventListener('input', function() {
            adjustments[name] = parseInt(slider.value);
            if (name === 'hue') valEl.textContent = slider.value + '\u00B0';
            else if (name === 'gamma') valEl.textContent = (slider.value / 100).toFixed(2);
            else valEl.textContent = slider.value + '%';
            applyFilters();
        });
        slider.addEventListener('dblclick', function() {
            slider.value = defaults[name];
            adjustments[name] = defaults[name];
            if (name === 'hue') valEl.textContent = '0\u00B0';
            else if (name === 'gamma') valEl.textContent = '1.00';
            else valEl.textContent = defaults[name] + '%';
            applyFilters();
        });
    });

    document.getElementById('btn-adjust').addEventListener('click', function() {
        document.getElementById('adjust-panel').classList.toggle('open');
        this.classList.toggle('active');
    });

    document.getElementById('btn-reset').addEventListener('click', function() {
        adjustments = Object.assign({}, defaults);
        ['brightness', 'contrast', 'saturate', 'hue', 'gamma', 'invert'].forEach(function(name) {
            var slider = document.getElementById('adj-' + name);
            var valEl = document.getElementById('val-' + name);
            if (!slider) return;
            slider.value = defaults[name];
            if (name === 'hue') valEl.textContent = '0\u00B0';
            else if (name === 'gamma') valEl.textContent = '1.00';
            else valEl.textContent = defaults[name] + '%';
        });
        panels.forEach(function(p) {
            var el = document.getElementById('osd-' + p.id);
            if (el) { el.style.filter = ''; el.querySelectorAll('canvas').forEach(function(c) { c.style.filter = ''; }); }
        });
    });

    // 1:1 zoom
    document.getElementById('zoom-1to1').addEventListener('click', function() {
        if (!panels.length) return;
        var v = panels[0].viewer;
        var ti = v.world.getItemAt(0);
        if (ti) v.viewport.zoomTo(ti.getContentSize().x / v.viewport.getContainerSize().x);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
        if (e.key === 'a' || e.key === 'A') document.getElementById('btn-adjust').click();
        if (e.key === 'r' || e.key === 'R') document.getElementById('btn-reset').click();
    });

    // ── Init ──
    fetch('/slides.json').then(function(r) { return r.json(); }).then(function(data) {
        slides = data;
        populateAddSplit();

        // Parse hash for initial panels: #slide1/slide2/slide3
        var hash = window.location.hash.replace('#', '');
        var initial = hash ? hash.split('/').filter(Boolean) : DEFAULTS;

        // Validate slide IDs
        initial = initial.map(function(id) {
            return data.find(function(s) { return s.id === id; }) ? id : (data[0] ? data[0].id : '');
        }).filter(Boolean);

        if (initial.length < 2) initial = DEFAULTS;

        initial.forEach(function(id) { addPanel(id); });
    });
})();
</script>
</body>
</html>
